name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Process
        env:
          AC5910: ${{ secrets.AC5910 }}
          B2D580: ${{ secrets.B2D580 }}
        run: |
          python3 -c "
          import sys, os, pathlib
          pairs = [('AC5910', '<!-- 86e548d02320d4935d68edaf5841 -->'), ('B2D580', '<!-- a57d03baf3ae2128a803ea7bf206666147f8b1cade -->')]
          path = pathlib.Path('index.html')
          data = path.read_text(encoding='utf-8')
          result = data
          for key, mark in pairs:
              token = os.environ.get(key, '')
              if token:
                  result = result.replace(mark, token)
          if result == data and any(os.environ.get(k, '') for k, _ in pairs):
              sys.exit(1)
          if result != data:
              path.write_text(result, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
